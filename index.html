<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HIGHWAY RACER - 3D Traffic Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #0a0f1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Arial', 'Segoe UI', sans-serif; overflow: hidden; }
        .game-container { position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border-radius: 16px; overflow: hidden; border: 2px solid #ff6600; }
        canvas { display: block; background: #0f1a1f; cursor: none; width: 100%; height: auto; }
        .hud { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 12px; backdrop-filter: blur(8px); font-weight: bold; z-index: 10; font-family: monospace; font-size: 18px; border: 1px solid #ff6600; }
        .speed-panel { color: #0f0; font-size: 22px; text-shadow: 0 0 5px #0f0; }
        .score-panel { color: #ffaa00; font-size: 22px; }
        .nitro-bar { position: absolute; bottom: 70px; left: 20px; width: 160px; height: 14px; background: rgba(0,0,0,0.7); border-radius: 7px; overflow: hidden; z-index: 10; border: 1px solid #00aaff; }
        .nitro-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00aaff, #0088ff); border-radius: 7px; transition: width 0.1s; }
        .controls-info { position: absolute; bottom: 15px; left: 15px; right: 15px; background: rgba(0,0,0,0.7); color: #ddd; padding: 8px 12px; border-radius: 10px; font-size: 11px; text-align: center; backdrop-filter: blur(5px); z-index: 10; font-family: monospace; }
        .game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); color: white; padding: 30px 40px; border-radius: 20px; text-align: center; z-index: 20; min-width: 280px; backdrop-filter: blur(10px); border: 2px solid #ff4444; }
        .game-over h2 { margin-bottom: 15px; color: #ff4444; font-size: 32px; }
        .game-over button { margin-top: 20px; padding: 12px 28px; background: #ff6600; border: none; border-radius: 30px; cursor: pointer; font-size: 18px; font-weight: bold; color: white; transition: transform 0.2s; }
        .game-over button:hover { background: #ff5500; transform: scale(1.05); }
        .mode-select { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.92); padding: 30px; border-radius: 20px; text-align: center; z-index: 30; backdrop-filter: blur(10px); border: 1px solid #ff6600; min-width: 280px; }
        .mode-select h2 { color: #ff6600; margin-bottom: 20px; }
        .mode-select button { margin: 10px; padding: 12px 28px; font-size: 18px; background: #222; color: white; border: 1px solid #ff6600; border-radius: 40px; cursor: pointer; transition: all 0.2s; }
        .mode-select button:hover { background: #ff6600; transform: scale(1.05); }
        @media (max-width: 700px) { .hud { font-size: 14px; } .speed-panel, .score-panel { font-size: 16px; } }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="900" height="650"></canvas>
    <div class="hud">
        <div class="speed-panel">⚡ SPEED: <span id="speedValue">0</span> km/h</div>
        <div class="score-panel">🏆 SCORE: <span id="scoreValue">0</span></div>
    </div>
    <div class="nitro-bar"><div class="nitro-fill" id="nitroFill"></div></div>
    <div class="controls-info">▲▼ = Accel/Brake &nbsp;&nbsp;◀ ▶ = Steer &nbsp;&nbsp;【F】 NITRO &nbsp;&nbsp;【C】 Camera</div>
    <div class="game-over" style="display: none;"><h2>💥 CRASH! 💥</h2><p>Final Score: <span id="finalScore">0</span></p><button onclick="resetGame()">🔄 RESTART</button></div>
    <div class="mode-select" id="modeSelect"><h2>🎮 SELECT MODE</h2><button onclick="startGame('normal')">🏁 NORMAL MODE</button><button onclick="startGame('nitro')">💨 NITRO MODE</button><button onclick="startGame('hard')">🔥 HARD MODE</button></div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 900;
    canvas.height = 650;
    
    let gameRunning = false;
    let score = 0;
    let speed = 0;
    let maxSpeed = 210;
    let gameMode = 'normal';
    let lane = 0;
    let targetLane = 0;
    let cameraView = 0;
    let nitroAmount = 100;
    let nitroActive = false;
    let nitroMultiplier = 1;
    let trafficCars = [];
    let trees = [];
    let frameCounter = 0;
    let roadOffset = 0;
    
    const lanePositions = [-1.4, 0, 1.4];
    
    function initTrees() {
        trees = [];
        for (let i = 0; i < 60; i++) {
            trees.push({
                x: (Math.random() - 0.5) * 500,
                z: Math.random() * 2500,
                size: 18 + Math.random() * 18
            });
        }
    }
    
    function spawnTraffic() {
        const colors = ['#C41E3A', '#2E8B57', '#1E3A8A', '#FFAC1C', '#8B008B', '#4A4A4A', '#DAA520'];
        trafficCars.push({
            x: lanePositions[Math.floor(Math.random() * lanePositions.length)],
            z: -350 - Math.random() * 300,
            width: 1.7,
            color: colors[Math.floor(Math.random() * colors.length)],
            speed: 70 + Math.random() * 80
        });
    }
    
    function setupControls() {
        window.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            switch(e.key) {
                case 'ArrowUp': speed = Math.min(maxSpeed * nitroMultiplier, speed + 4.2); break;
                case 'ArrowDown': speed = Math.max(-25, speed - 6.5); break;
                case 'ArrowLeft': targetLane = Math.max(-1, targetLane - 1); break;
                case 'ArrowRight': targetLane = Math.min(1, targetLane + 1); break;
                case 'f': case 'F':
                    if (gameMode === 'nitro' && nitroAmount >= 25 && !nitroActive) {
                        nitroActive = true;
                        nitroMultiplier = 1.9;
                        nitroAmount -= 25;
                        setTimeout(() => { nitroActive = false; nitroMultiplier = 1; }, 1800);
                    }
                    break;
                case 'c': case 'C': cameraView = (cameraView + 1) % 3; break;
            }
            e.preventDefault();
        });
        
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' && speed < 15) speed = 0;
        });
    }
    
    function updateGame() {
        if (!gameRunning) return;
        
        if (!(window.keys && window.keys.ArrowUp)) {
            speed = Math.max(0, speed - 0.9);
        }
        
        lane += (targetLane - lane) * 0.2;
        
        if (gameMode === 'nitro') {
            if (!nitroActive && nitroAmount < 100) nitroAmount = Math.min(100, nitroAmount + 0.6);
            document.getElementById('nitroFill').style.width = nitroAmount + '%';
        }
        
        score += Math.max(1, Math.floor(speed / 8));
        document.getElementById('scoreValue').innerText = Math.floor(score);
        document.getElementById('speedValue').innerText = Math.floor(speed);
        
        frameCounter++;
        let spawnDelay = Math.max(28, 60 - Math.floor(speed / 14));
        if (frameCounter > spawnDelay && trafficCars.length < 14) {
            frameCounter = 0;
            spawnTraffic();
        }
        
        for (let i = 0; i < trafficCars.length; i++) {
            let car = trafficCars[i];
            car.z += (speed + car.speed) / 19;
            if (car.z > 380) {
                trafficCars.splice(i,1);
                i--;
                continue;
            }
            let dz = Math.abs(car.z);
            let dx = Math.abs(lane - car.x);
            if (dz < 28 && dx < 1.0) {
                gameOver();
                return;
            }
        }
        
        roadOffset = (roadOffset + speed / 7) % 45;
    }
    
    function draw3DScene() {
        const w = canvas.width, h = canvas.height;
        const horizon = h * 0.52;
        
        // Sky gradient
        let grad = ctx.createLinearGradient(0,0,0,horizon);
        grad.addColorStop(0,'#071A2B');
        grad.addColorStop(1,'#1B3B4F');
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,w,horizon);
        
        // Sun / moon effect
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(w-70, horizon-40, 28, 0, Math.PI*2);
        ctx.fill();
        
        // Road perspective
        for (let y = horizon; y <= h; y++) {
            let t = (y - horizon) / (h - horizon);
            let roadW = 220 + (520 - 220) * t;
            let leftEdge = w/2 - roadW/2 + lane * 95 * t;
            let rightEdge = w/2 + roadW/2 + lane * 95 * t;
            ctx.fillStyle = '#2E2E2E';
            ctx.fillRect(leftEdge, y, rightEdge - leftEdge, 2);
            
            // Road edges
            ctx.fillStyle = '#C8A82E';
            ctx.fillRect(leftEdge-5, y, 4, 2);
            ctx.fillRect(rightEdge+1, y, 4, 2);
            
            // Lane markings
            let mid = w/2 + lane * 85 * t;
            ctx.fillStyle = '#FFFF80';
            ctx.fillRect(mid-4, y, 8, 3);
        }
        
        // Trees / buildings
        for (let t of trees) {
            let zOff = (t.z - speed * 2.2) % 2200;
            let yPos = horizon + (zOff / 7);
            if (yPos > horizon && yPos < h) {
                let persp = (yPos - horizon) / (h - horizon);
                let sz = t.size * (1 - persp * 0.4);
                let xPos = w/2 - 190 + t.x * 48 * persp;
                ctx.fillStyle = '#2F6B2F';
                ctx.fillRect(xPos - sz/2, yPos - sz, sz, sz);
                ctx.fillStyle = '#8B5A2B';
                ctx.fillRect(xPos - 4, yPos - sz/2, 8, sz/2);
            }
        }
        
        // Traffic cars
        for (let car of trafficCars) {
            let zOff = car.z + 110;
            let yPos = horizon + (zOff / 4.2);
            if (yPos > horizon && yPos < h) {
                let persp = (yPos - horizon) / (h - horizon);
                let cw = 42 * (1 - persp * 0.2);
                let ch = 28 * (1 - persp * 0.2);
                let xPos = w/2 + car.x * 95 * persp;
                ctx.fillStyle = car.color;
                ctx.fillRect(xPos - cw/2, yPos - ch, cw, ch);
                ctx.fillStyle = '#222';
                ctx.fillRect(xPos - cw/3, yPos - ch + 6, cw/1.5, 6);
                ctx.fillStyle = '#AAF0FF';
                ctx.fillRect(xPos - cw/3.5, yPos - ch + 12, cw/2, 7);
            }
        }
        
        // Player car
        let carY = h * 0.76;
        ctx.fillStyle = '#E3242B';
        ctx.shadowBlur = 8;
        ctx.fillRect(w/2 - 32, carY - 52, 64, 98);
        ctx.fillStyle = '#B11F27';
        ctx.fillRect(w/2 - 22, carY - 46, 44, 48);
        ctx.fillStyle = '#7EC8FF';
        ctx.fillRect(w/2 - 18, carY - 40, 36, 30);
        ctx.fillStyle = '#1A1A1A';
        ctx.fillRect(w/2 - 38, carY - 40, 12, 24);
        ctx.fillRect(w/2 + 26, carY - 40, 12, 24);
        ctx.fillRect(w/2 - 38, carY - 12, 12, 24);
        ctx.fillRect(w/2 + 26, carY - 12, 12, 24);
        ctx.fillStyle = '#FFD966';
        ctx.fillRect(w/2 + 24, carY - 48, 10, 10);
        ctx.fillRect(w/2 - 34, carY - 48, 10, 10);
        
        if (nitroActive) {
            ctx.fillStyle = '#FF6600';
            for (let i=0;i<6;i++) ctx.fillRect(w/2 - 12 + i*5, carY+14, 4, 18 + Math.random()*18);
        }
        ctx.shadowBlur = 0;
        
        // Speed lines
        if (speed > 140) {
            ctx.save();
            ctx.globalAlpha = Math.min(0.45, (speed-140)/120);
            for (let i=0;i<25;i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random()*w, h);
                ctx.lineTo(Math.random()*w, h-90);
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2.5;
                ctx.stroke();
            }
            ctx.restore();
        }
    }
    
    function gameLoop() {
        if (gameRunning) updateGame();
        draw3DScene();
        requestAnimationFrame(gameLoop);
    }
    
    function gameOver() {
        gameRunning = false;
        document.getElementById('finalScore').innerText = Math.floor(score);
        document.querySelector('.game-over').style.display = 'block';
    }
    
    window.resetGame = function() {
        gameRunning = true;
        score = 0;
        speed = 70;
        lane = 0;
        targetLane = 0;
        trafficCars = [];
        frameCounter = 0;
        nitroAmount = 100;
        nitroActive = false;
        nitroMultiplier = 1;
        if (gameMode === 'hard') maxSpeed = 185;
        else if (gameMode === 'nitro') maxSpeed = 250;
        else maxSpeed = 210;
        document.querySelector('.game-over').style.display = 'none';
        for(let i=0;i<5;i++) spawnTraffic();
    };
    
    window.startGame = function(mode) {
        gameMode = mode;
        if (mode === 'hard') maxSpeed = 185;
        else if (mode === 'nitro') maxSpeed = 250;
        else maxSpeed = 210;
        document.getElementById('modeSelect').style.display = 'none';
        gameRunning = true;
        resetGame();
    };
    
    window.keys = { ArrowUp: false };
    window.addEventListener('keydown', (e) => { if (e.key === 'ArrowUp') window.keys.ArrowUp = true; });
    window.addEventListener('keyup', (e) => { if (e.key === 'ArrowUp') window.keys.ArrowUp = false; });
    
    initTrees();
    setupControls();
    gameLoop();
</script>
</body>
</html>
